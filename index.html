<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>EF Pong</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23006BD6'/><circle cx='50' cy='50' r='24' fill='white'/></svg>">

<!-- PWA: installable, launches full-screen like a native app -->
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="EF Pong">

<link rel="stylesheet" href="css/app.css">
<script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
<div id="app">
  <header id="header"></header>
  <main id="view" class="app-scroll"></main>
  <nav id="nav"></nav>
  <div id="gate"></div>
  <div id="menu"></div>
  <div id="dispute"></div>
  <div id="season"></div>
  <div id="podium"></div>
  <div id="confetti"></div>
  <div id="toast"></div>
</div>
<script type="module" src="js/app.js"></script>
<script>
  // Register the service worker so the app is installable / works offline.
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(err =>
        console.warn('SW registration failed', err));
    });
  }
</script>
</body>
</html>
